# Explicitly include Node.js — custom nixPkgs replaces nixpacks' defaults,
# so nodejs must be listed here or npm will not be found.
[phases.setup]
nixPkgs = [
  "nodejs_20",
  "cairo",
  "pango",
  "libpng",
  "libjpeg",
  "giflib",
  "librsvg",
  "pkg-config",
  "pixman",
  "fontconfig",
  "freetype",
  "python3",
]
