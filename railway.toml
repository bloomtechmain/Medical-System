[build]
builder = "dockerfile"
# No dockerfilePath — each service finds its own Dockerfile from its Root Directory:
#   server service  (Root Dir = server/) → server/Dockerfile
#   client service  (Root Dir = client/) → client/Dockerfile

[deploy]
# healthcheckPath is omitted — the shared value "/api/health" caused the
# frontend (static site) health check to fail. Each service can set its
# own health check path in the Railway dashboard if needed.
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
