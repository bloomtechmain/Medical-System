[build]
builder = "dockerfile"
dockerfilePath = "server/Dockerfile"
# Root Directory must be blank (repo root) in Railway service settings.
# Build context = entire repo so server/Dockerfile can access both
# server/ and client/ source files.

[deploy]
# healthcheckPath is omitted — the shared value "/api/health" caused the
# frontend (static site) health check to fail. Each service can set its
# own health check path in the Railway dashboard if needed.
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
